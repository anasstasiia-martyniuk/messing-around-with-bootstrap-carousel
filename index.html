<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <link rel="stylesheet" href="./style.css">
</head>
<body class="bg-black">
    <div class="container-lg px-5">
        <div class="container-cube">
            <div class="cube position-relative">
                <div class="w-100 h-100 right carousel slide position-absolute" id="carouselExampleSlidesOnly" data-bs-ride="carousel" data-bs-interval="5000" data-bs-pause="false">
                    <div class="carousel-inner">
                        <div class="carousel-item active">
                            <img src="./img/light.png" class="w-100" alt="...">
                        </div>
                        <div class="carousel-item">
                            <img src="./img/dark.png" class="w-100" alt="...">
                        </div>
                    </div>
                </div>
                <div class="w-100 h-100 back carousel slide position-absolute" id="carouselExampleSlidesOnly" data-bs-ride="carousel" data-bs-interval="5000" data-bs-pause="false">
                    <div class="carousel-inner">
                        <div class="carousel-item active">
                            <img src="./img/light.png" class="w-100" alt="...">
                        </div>
                        <div class="carousel-item position-relative">
                            <img src="./img/dark.png" class="w-100" alt="...">
                        </div>
                    </div>
                </div>
                <div class="w-100 h-100 bottom carousel slide position-absolute" id="carouselExampleSlidesOnly" data-bs-ride="carousel" data-bs-interval="5000" data-bs-pause="false">
                    <div class="carousel-inner">
                        <div class="carousel-item active">
                            <img src="./img/light-floor.png" class="w-100" alt="...">
                        </div>
                        <div class="carousel-item">
                            <img src="./img/dark-floor.png" class="w-100" alt="...">
                        </div>
                    </div>
                </div>

                <div class="cube position-absolute w-100 h-100">
                    <div class="w-100 h-100 right carousel slide position-absolute" id="carouselExampleSlidesOnly" data-bs-ride="carousel" data-bs-interval="5000" data-bs-pause="false">
                        <div class="carousel-inner">
                            <div class="carousel-item active ms-5 mt-5" style="width: 240px; height: 220px; rotate: -90deg; left: 30px;">
                                <img src="./img/window_light.png" class="w-100" alt="...">
                            </div>
                            <div class="carousel-item ms-5 mt-5" style="width: 240px; height: 220px; rotate: -90deg; left: 30px;">
                                <img src="./img/window-dark.png" class="w-100" alt="...">
                            </div>
                        </div>
                    </div>
                    <div class="w-100 h-100 back position-absolute">
                        <img src="./img/posters.png" class="w-100 h-100">
                    </div>
            </div>

            <div class="cube position-absolute w-100 h-100">
                <div class="w-100 h-100 back table carousel carousel-fade slide position-absolute" id="carouselExampleSlidesOnly" data-bs-ride="carousel" data-bs-interval="5000" data-bs-pause="false">
                    <div class="carousel-inner">
                        <div class="carousel-item active d-flex justify-content-center">
                            <img src="./img/dark.png" class="mt-3" style="width: 340px; height: 220px;" alt="...">
                        </div>
                        <div class="carousel-item position-relative d-flex justify-content-center">
                            <img src="./img/light.png" class="mt-3" style="width: 340px; height: 220px;" alt="...">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
